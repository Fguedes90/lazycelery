# Release workflow - builds binaries and publishes to GitHub + crates.io + Homebrew

name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Check if we should run (skip for non-release PRs)
  ci-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          LAST_COMMIT=$(git log -1 --pretty=format:"%s")
          if [[ "$LAST_COMMIT" == *"[skip ci]"* ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "should_release=true" >> $GITHUB_OUTPUT

  # Build binaries
  build:
    needs: ci-check
    if: needs.ci-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: lazycelery-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: lazycelery-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: lazycelery-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: lazycelery-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: lazycelery-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/lazycelery.exe dist/
            cd dist && powershell -Command "Compress-Archive -Path lazycelery.exe -DestinationPath ${{ matrix.artifact_name }} -Force"
          else
            cp target/${{ matrix.target }}/release/lazycelery dist/lazycelery
            tar -czf ${{ matrix.artifact_name }} dist/lazycelery
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.artifact_name }}

  # Create GitHub Release
  create-release:
    needs: [ci-check, build]
    if: needs.ci-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Prepare release
        id: prepare
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] && echo "$f:$(sha256sum "$f" | cut -d' ' -f1)"
          done > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.version }}
          name: LazyCelery v${{ steps.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io
  publish-crate:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --locked

  # Update Homebrew tap
  update-homebrew:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          repository: Fguedes90/homebrew-tap
          path: homebrew-tap

      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Get version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          SOURCE_URL="https://github.com/Fguedes90/lazycelery/archive/v$VERSION.tar.gz"
          curl -sL "$SOURCE_URL" | sha256sum | cut -d' ' -f1 > checksum.txt
          echo "SOURCE_SHA=$(cat checksum.txt)" >> $GITHUB_ENV

      - name: Update formula
        run: |
          cd homebrew-tap
          cp ../main-repo/packaging/homebrew/lazycelery.rb Formula/lazycelery.rb
          
          sed -i "s/PLACEHOLDER_SHA256/${{ env.SOURCE_SHA }}/g" Formula/lazycelery.rb
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v${{ env.VERSION }}/g" Formula/lazycelery.rb
          sed -i "s/version \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/version \"${{ env.VERSION }}\"/g" Formula/lazycelery.rb
          sed -i "s/VERSION/${{ env.VERSION }}/g" Formula/lazycelery.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazycelery.rb
          git commit -m "Update lazycelery to v${{ env.VERSION }}"
          git push
